<!DOCTYPE html>
<!-- saved from url=(0027)https://boardsofcanada.com/ -->
<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BoC</title>
  <meta name="title" content="BoC">
  <meta name="description" content="INFERNO. 29 MAY.">
  <link rel="canonical" href="https://BOC.com/">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://BOC.com/">
  <meta property="og:title" content="BoC">
  <meta property="og:description" content="INFERNO. 29 MAY.">
  <meta property="og:image" content="./boc_files/sharing.jpg">
  <link rel="icon" href="./boc_files/favicon.png" type="image/png">
  <link rel="stylesheet" href="./boc_files/fonts.css">
  <link rel="stylesheet" type="text/css" href="./boc_files/reset.css">
  <style>
    :root {
      --bg-color: #000000;
      --text: #ffffff;
      --font-size: 1.05rem;
      --line: rgba(255, 255, 255, 0.18);
      --soft-blur: 0.5px;
      --initial-blur: 4px;
      --ease: ease;
      --entry-duration: 3s;
      --link-vertical-padding: clamp(8px, 1.4svh, 16px);
      --hover-duration: 1400ms;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "itc-avant-garde-gothic-pro", sans-serif;
      font-weight: 300;
      font-size: var(--font-size);
      font-style: normal;
      text-transform: uppercase;
      color: var(--text);
      background-color: var(--bg-color);
      background-image: url('./boc_files/bg.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      overflow: hidden;
    }

    .viewport {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .page {
      width: min(100%, 820px);
      max-height: 100svh;
      padding: clamp(16px, 3svh, 40px) clamp(16px, 5vw, 48px);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(10px, 1.5svh, 24px);
      opacity: 0;
      filter: blur(var(--initial-blur));
      animation: pageFadeIn var(--entry-duration) var(--ease) forwards;
    }

    .artwork {
      display: block;
      width: min(180px, 24svh, 30vw);
      max-width: 100%;
      height: auto;
      margin: 0 auto 8px;
    }

    .title {
      margin: 0;
      display: block;
      width: min(100%, clamp(220px, 46vw, 500px));
      height: auto;
    }

    .subtitle {
      margin: 8px 0;
      font-size: var(--font-size);
      line-height: 1;
      font-weight: 400;
      letter-spacing: -0.03em;
    }

    .links {
      width: min(100%, 572px);
      margin: 0 auto;
      border-top: none;
      padding-top: 0;
      filter: blur(var(--soft-blur));
    }

    .links a {
      display: block;
      padding: var(--link-vertical-padding) 16px;
      border-bottom: 1px solid var(--line);
      color: inherit;
      text-decoration: none;
      font-size: var(--font-size);
      line-height: 1;
      font-weight: 400;
      letter-spacing: -0.04em;
      opacity: 1;
      transition:
        opacity var(--hover-duration) var(--ease),
        background-color var(--hover-duration) var(--ease);
    }

    .links a:hover,
    .links a:focus-visible {
      opacity: 0.82;
      background-color: rgba(255, 255, 255, 0.02);
      outline: none;
    }

    .links a:last-child {
      border-bottom: none;
    }

    .mailing-list {
      margin: 8px 0 0;
      font-size: var(--font-size);
      line-height: 1.15;
      letter-spacing: -0.03em;
    }

    .mailing-list button {
      background: rgb(255, 255, 255);
      border-radius: 30px;
      border-style: none;
      border-color: rgb(0, 0, 0);
      border-width: 0px;
      color: rgb(135, 137, 137);
      font-family: itc-avant-garde-gothic-pro, "Century Gothic", CenturyGothic, AppleGothic, sans-serif;
      font-size: 17px;
      font-weight: 300;
      letter-spacing: 0px;
      line-height: 1;
      font-style: normal;
      text-transform: uppercase;
      white-space: normal;
      padding: 0 30px;
      text-align: center;
      word-break: break-word;
      align-self: flex-end;
      cursor: pointer;
      pointer-events: auto;
      height: 55px;
      width: 100%;
    }

    .mailing-list button:hover,
    .mailing-list button:focus-visible {
      opacity: 0.88;
      border-color: rgba(255, 244, 220, 0.34);
      box-shadow:
        inset 0 0 0 999px rgba(255, 244, 220, 0.05),
        inset 0 1px 0 rgba(255, 250, 238, 0.2),
        inset 0 -10px 24px rgba(0, 0, 0, 0.06),
        0 16px 30px -18px rgba(0, 0, 0, 0.3),
        0 0 40px -18px rgba(255, 244, 220, 0.14);
      outline: none;
    }

    .mailing-list button:active {
      transition-duration: 220ms;
    }

    @keyframes pageFadeIn {
      0% {
        opacity: 0;
        filter: blur(var(--initial-blur));
      }

      100% {
        opacity: 0.8;
        filter: blur(var(--soft-blur));
      }
    }

    @media only screen and (max-width: 600px) {
      @keyframes pageFadeIn {
        0% {
          opacity: 0;
          filter: blur(var(--initial-blur));
        }

        100% {
          opacity: 0.9;
          filter: blur(var(--soft-blur));
        }
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .page {
        opacity: 1;
        filter: blur(var(--soft-blur));
        animation: none;
      }

      .artwork,
      .title,
      .subtitle,
      .mailing-list {
        opacity: 1;
        transform: none;
        scale: 1;
        filter: blur(var(--soft-blur));
        animation: none;
      }

      .artwork {
        display: block;
        width: min(198px, 32vw);
        aspect-ratio: 1.54;
        margin: 0 auto clamp(12px, 3vh, 32px);
        box-shadow: 0 0 24px rgba(255, 255, 255, 0.05);
        transform: none;
        scale: 0.992;
      }

      .links {
        opacity: 1;
        transform: none;
        scale: 1;
        filter: blur(var(--soft-blur));
        animation: none;
      }

      .links a {
        animation: none;
        opacity: 1;
        transform: none;
        scale: 1;
        filter: blur(var(--soft-blur));
        transition: opacity 180ms ease;
      }

      .links a:hover,
      .links a:focus-visible {
        transform: none;
      }

      .mailing-list button {
        transition: none;
      }

      .mailing-list button:hover,
      .mailing-list button:focus-visible,
      .mailing-list button:active {
        transform: none;
      }
    }

    @media (max-height: 700px) {
      .page {
        padding-top: 12px;
        padding-bottom: 12px;
        gap: 8px;
      }

      .artwork {
        width: min(144px, 20svh, 28vw);
        margin-bottom: 6px;
      }

      .title {
        width: min(100%, clamp(200px, 40vw, 430px));
      }

      .subtitle {
        font-size: var(--font-size);
        margin: 4px 0;
      }

      .links a,
      .mailing-list button {
        font-size: var(--font-size);
      }

      .mailing-list button {
        min-height: 3rem;
        padding: 0.7rem 1.25rem 0.76rem;
      }
    }

     }
    }

    button {
      transition: all 1s ease !important;
    }
  </style>
  </head>
  <div class="viewport">
    <main class="page">
      <img class="artwork" src="./boc_files/family.png" alt="Logo">
      <img class="title" src="./boc_files/title.png" alt="Title">
      <p class="subtitle">9 APRIL</p>
      <nav class="links" aria-label="Links">
        <a href="https://mananamanana.com" target="_blank">Pre-order</a>
        <a href="https://mananamanana.com/about" target="_blank">About</a>
        <a href="https://mananamanana.com/now" target="_blank">Now</a>
      </nav>
      <p class="mailing-list"><a href="https://mananamanana.com/register"><button type="button">Register For Stuff</button></a></p>
    </main>
  </div>
</body>
</html>
